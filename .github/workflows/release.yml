name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package addon
        run: |
          cd ..
          zip -r BoomerMode/BoomerMode.zip BoomerMode \
            -x "BoomerMode/.git*" \
            -x "BoomerMode/.github/*" \
            -x "BoomerMode/.vscode/*" \
            -x "BoomerMode/*.md" \
            -x "BoomerMode/.gitignore" \
            -x "BoomerMode/.pkgmeta"
          cd BoomerMode

      - name: Upload to CurseForge
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CURSE_ID: ${{ secrets.CURSE_ID }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          # Look up the CurseForge numeric version ID for 12.0.5
          CF_VERSION_ID=$(curl -sf -H "X-Api-Token: $CF_API_KEY" \
            "https://wow.curseforge.com/api/game/versions" | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for v in data:
              if v.get('name') == '12.0.5':
                  print(v['id']); sys.exit(0)
          sys.exit(1)
          ")

          curl -sf -X POST \
            -H "X-Api-Token: $CF_API_KEY" \
            -F "metadata={\"changelog\":\"Release $TAG\",\"gameVersions\":[$CF_VERSION_ID],\"releaseType\":\"beta\",\"displayName\":\"$TAG\"}" \
            -F "file=@BoomerMode.zip" \
            "https://wow.curseforge.com/api/projects/$CURSE_ID/upload-file"
